name: CI

on:
  push:
    branches:
      - biblelot
  pull_request:
    branches:
      - biblelot

jobs:
  node-lint-build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run mobile typecheck
        run: npm --prefix apps/mobile run typecheck

      - name: Run mobile tests
        run: npm --prefix apps/mobile run test

      - name: Build applications
        run: npm run build

      - name: Run API regression probes
        run: npm --prefix apps/api run test:regression

      - name: Run desktop auth/session hardening tests
        run: npm --prefix apps/desktop run test:auth-session

      - name: Run desktop phase 1 smoke suite
        run: npm --prefix apps/desktop run phase1:smoke
